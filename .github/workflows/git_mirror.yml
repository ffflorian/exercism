name: Mirror to Codeberg and GitLab

permissions: {}

on:
  push:
    branches: [main]

jobs:
  mirror:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: ffflorian/actions/git-mirror@dcf7867b80c82038098ed48c2eaf9944e84a98bb
        with:
          GITLAB_REMOTE: 'git@gitlab.com:ffflorian/exercism.git'
          GITLAB_SECRET: ${{ secrets.GITLAB_SECRET }}
          GITLAB_PUSH_ALL_REFS: 'false'
          CODEBERG_REMOTE: 'git@codeberg.org:ffflorian/exercism.git'
          CODEBERG_SECRET: ${{ secrets.CODEBERG_SECRET }}
          CODEBERG_PUSH_ALL_REFS: 'false'
