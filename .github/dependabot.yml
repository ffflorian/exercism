updates:
  - assignees:
      - ffflorian
    commit-message:
      prefix: fix(deps)
      prefix-development: chore(deps-dev)
    cooldown:
      default-days: 5
      exclude:
        - '@ffflorian/*'
    directories:
      - /javascript
      - /typescript
    groups:
      babel:
        patterns:
          - '@babel/*'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
    ignore:
      - dependency-name: '@types/node'
        versions:
          - '> 26'
      - dependency-name: eslint
        versions:
          - '> 8'
    open-pull-requests-limit: 99
    package-ecosystem: npm
    schedule:
      interval: weekly
    versioning-strategy: increase
  - assignees:
      - ffflorian
    commit-message:
      prefix: ci(deps)
    cooldown:
      default-days: 5
      exclude:
        - ffflorian/*
    directory: /
    open-pull-requests-limit: 99
    package-ecosystem: github-actions
    schedule:
      interval: weekly
version: 2
